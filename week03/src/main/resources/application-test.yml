# 阿里云短信配置（短信认证服务 - 个人免资质）
aliyun:
  sms:
    # 是否启用短信服务
    enabled: true
    # 服务端点配置
    endpoint: dypnsapi.aliyuncs.com
    region-id: cn-hangzhou
    # ⚠️ 在这里设置你的 AccessKey
    access-key-id: your-access-key-id  # 替换为你的真实 AccessKey ID
    access-key-secret: your-access-key-secret  # 替换为你的真实 AccessKey Secret
    # 赠送签名（见 1.3 赠送签名配置）
    sign-name: "速通互联验证码"
    # 赠送模板 CODE（见 1.4 赠送模板配置）
    template-code: "100001"
    # 方案名称，可选，不填为默认方案
    scheme-name: ""
